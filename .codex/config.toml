[shell_environment_policy]
inherit = "core"

[shell_environment_policy.set]
CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS = "1"

[mcp_servers.flow-nexus]
command = "npx"
args = [
    "-y",
    "flow-nexus@latest",
    "mcp",
    "start",
]

[mcp_servers.flow-nexus.env]
npm_config_update_notifier = "false"

[mcp_servers.notebooklm]
command = "notebooklm-mcp"

[mcp_servers.ruflo]
command = "npx"
args = [
    "-y",
    "@sparkleideas/ruflo@latest",
    "mcp",
    "start",
]

[mcp_servers.ruflo.env]
npm_config_update_notifier = "false"
CLAUDE_FLOW_MAX_AGENTS = "15"
CLAUDE_FLOW_SWARM_TOPOLOGY = "hierarchical-mesh"
CLAUDE_FLOW_MEMORY_TYPE = "hybrid"

[mcp_servers.ruv-swarm]
command = "npx"
args = [
    "-y",
    "ruv-swarm@latest",
    "mcp",
    "start",
]

[mcp_servers.ruv-swarm.env]
npm_config_update_notifier = "false"
