# morph-kgc config for the OPDA PDTF -> RDF mapping.
#
# This INI runs the RML mapping AS-IS: the mapping's own rml:source literal
# names the data file. For running the same mapping against an arbitrary
# conformant instance, prefer harness/run_mapping.py --mapping <ttl> --data
# <instance.json> (it rewrites rml:source to the chosen instance and generates
# a temp INI). See README.md.
#
# Usage:  morph-kgc mapping/morph-config.ini
# Output: build/out.nt  (N-Triples)

[CONFIGURATION]
output_file=../build/out.nt
output_format=N-TRIPLES

[DataSource1]
mappings=opda-pdtf.rml.ttl
