# Site stack — opda.org.uk AWS hosting (ADR-0038 / ADR-0040)
#
# The eu-west-2 stack: everything except the two us-east-1 control-plane
# exceptions (ACM cert + Lambda@Edge gate, which arrive as parameters from
# the edge stack — exports do not cross regions).
#
#   - SSM parameter /opda/gate/config — the edge gate's runtime config
#     (Lambda@Edge has no environment variables, ADR-0038): the Auth0 tenant
#     + SPA client the gate runs its PKCE flow against, and the member
#     e-mail allowlist the gate enforces (Auth0 is retained as the IdP;
#     there are no AWS-side auth resources)
#   - Private S3 site bucket + CloudFront distribution (OAC), viewer-request
#     gate on every behavior; /api/v2/* routed to the Artalk comments origin
#   - Route 53 apex alias records
#
# The Artalk runtime (VPC, ECS Fargate, ECR, Litestream bucket, the
# comments-origin DNS updater) lives in the comments stack; this stack only
# carries the CloudFront origin + behavior pointing at it.
#
# Deployed by CI (.github/workflows/infra.yml) AFTER the edge stack.
AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  opda.org.uk site resources (eu-west-2): S3 + CloudFront, Route 53 records,
  edge-gate Auth0 config (ADR-0038/ADR-0040).

Parameters:
  DomainName:
    Type: String
    Default: opda.org.uk
  CertificateArn:
    Type: String
    Description: ACM certificate ARN (us-east-1, from the opda-edge stack).
  GateFunctionVersionArn:
    Type: String
    Description: Lambda@Edge gate VERSION ARN (from the opda-edge stack).
  Auth0Domain:
    Type: String
    Description: Auth0 tenant domain the gate authenticates against (e.g. opda.eu.auth0.com).
  Auth0ClientId:
    Type: String
    Description: Auth0 SPA application client ID (public, PKCE — no secret).
  MemberEmails:
    Type: String
    Default: henrik@sparklingideas.co.uk
    Description: >-
      Comma-separated member e-mail allowlist, enforced by the edge gate
      (ADR-0038: Auth0's shared dev keys authenticate any Google account, so
      membership is a gate-side check). Sourced by the infra workflow from the
      committed config/aws/members.txt (one e-mail per line) — edit that file to
      change who has access.

Resources:
  # The edge gate's runtime config (read at cold start from eu-west-2;
  # Lambda@Edge cannot carry environment variables — ADR-0038). Auth0 is the
  # IdP (retained, ADR-0038 §Auth); the SPA client is public/PKCE so no
  # secret appears here, and the member allowlist is enforced by the gate.
  GateConfigParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /opda/gate/config
      Type: String
      Value: !Sub |
        {"domain":"${Auth0Domain}","clientId":"${Auth0ClientId}","members":"${MemberEmails}"}

  # ---------------- Static site: S3 + CloudFront ----------------

  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudFrontOacRead
            Effect: Allow
            Principal: { Service: cloudfront.amazonaws.com }
            Action: s3:GetObject
            Resource: !Sub '${SiteBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}'

  # Artalk authenticates via the Authorization header and uses no cookies —
  # and MUST NOT receive the viewer's cookie jar: the gate tokens plus any
  # legacy cookies push the Cookie header past fasthttp's 4 KB request-header
  # cap, and Artalk answers 431 before routing (root-caused 2026-06-06: the
  # browser SSO exchange failed while a minimal-cookie curl succeeded). The
  # gate still sees and validates cookies at viewer-request; the origin gets
  # everything except them.
  CommentsOriginRequestPolicy:
    Type: AWS::CloudFront::OriginRequestPolicy
    Properties:
      OriginRequestPolicyConfig:
        Name: opda-comments-no-cookies
        Comment: All viewer headers except Host, all query strings, NO cookies
        HeadersConfig: { HeaderBehavior: allViewer }
        CookiesConfig: { CookieBehavior: none }
        QueryStringsConfig: { QueryStringBehavior: all }

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: opda-site-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: opda.org.uk (ADR-0038)
        Aliases: [!Ref DomainName]
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        HttpVersion: http2and3
        PriceClass: PriceClass_100   # NA + Europe — includes the London PoPs
        DefaultRootObject: index.html
        Origins:
          - Id: site-s3
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref OriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ''
          # Artalk comments origin — the comments stack maintains this DNS
          # name (single Fargate task's public IP). Resolution happens at
          # request time, so the origin may predate the record; /api/v2/*
          # 502s until the comments stack is live, which is harmless.
          - Id: comments
            DomainName: !Sub 'comments-origin.${DomainName}'
            CustomOriginConfig:
              HTTPPort: 23366
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: site-s3
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6   # Managed-CachingOptimized
          LambdaFunctionAssociations:
            - EventType: viewer-request
              LambdaFunctionARN: !Ref GateFunctionVersionArn
        CacheBehaviors:
          - PathPattern: '/api/v2/*'
            TargetOriginId: comments
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad     # Managed-CachingDisabled
            OriginRequestPolicyId: !Ref CommentsOriginRequestPolicy  # no cookies to Artalk
            LambdaFunctionAssociations:
              - EventType: viewer-request
                LambdaFunctionARN: !Ref GateFunctionVersionArn
        CustomErrorResponses:
          # OAC without ListBucket → S3 answers missing keys with 403.
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /404.html
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /404.html

  # ---------------- DNS ----------------

  ApexRecords:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      HostedZoneId: !ImportValue opda-hosted-zone-id
      RecordSets:
        - Name: !Ref DomainName
          Type: A
          AliasTarget:
            DNSName: !GetAtt Distribution.DomainName
            HostedZoneId: Z2FDTNDATAQYW2   # CloudFront's fixed zone ID
        - Name: !Ref DomainName
          Type: AAAA
          AliasTarget:
            DNSName: !GetAtt Distribution.DomainName
            HostedZoneId: Z2FDTNDATAQYW2

Outputs:
  SiteBucketName:
    Value: !Ref SiteBucket
  DistributionId:
    Value: !Ref Distribution
  DistributionDomainName:
    Value: !GetAtt Distribution.DomainName
  GateCallbackUrl:
    Description: Must be listed in the Auth0 SPA application's allowed callback URLs.
    Value: !Sub 'https://${DomainName}/_auth/callback'
