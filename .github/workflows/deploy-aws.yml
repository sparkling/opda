name: Deploy site to AWS

# App CI/CD per ADR-0040 §2: the AWS successor to deploy.yml (Cloudflare
# Pages). Build is identical — pnpm + JDK + `npm run build:data` (ADR-0021/
# 0036/0037: ephemeral build-time Fuseki + GRLC API, only dist/ ships) — and
# only the upload step differs: aws s3 sync + a full CloudFront invalidation
# (at ~20 views/day, simpler than hashed-path bookkeeping and inside the
# 1,000 free invalidation paths/month).
#
# CUTOVER STATE: workflow_dispatch only. Cloudflare (deploy.yml) remains the
# production deploy path until the ADR-0038 cutover; at cutover, move the
# push-paths trigger from deploy.yml here and delete deploy.yml (ADR-0040
# §More Information, cutover sequence).
#
# Auth: GitHub OIDC → opda-site-deploy role; no static AWS keys (ADR-0040 §1).
# The bucket and distribution IDs are read from the opda-site stack outputs at
# run time — no extra repository variables to drift.

on:
  workflow_dispatch:
  # At cutover, replace the line above with deploy.yml's `push:` block
  # (branches: [main] + the production-bundle paths filter) — kept identical
  # so the move is a cut-and-paste.

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      # ADR-0036/0037: build:data runs a local Apache Jena Fuseki 6.1.0 binary
      # (no Docker), which needs a JDK 17+ on the runner. The Fuseki dist itself
      # is self-provisioned (downloaded + sha512-verified) by build-with-data.mjs.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: pnpm install --frozen-lockfile

      # Build-time GRLC API's own deps (express, js-yaml).
      - run: npm --prefix src/api install --no-audit --no-fund

      # ADR-0021: launch local Fuseki + load the ontology TTLs + start the GRLC
      # API on localhost, run `astro build` (which queries the API to generate
      # entity pages), then tear it all down. The triplestore + API are
      # build-exclusive + ephemeral — only dist/ (static HTML) is deployed;
      # production never runs, reaches, or exposes them.
      - run: npm run build:data

      - name: Assume deploy role (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.OPDA_SITE_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Sync dist/ to the site bucket
        run: |
          SITE_BUCKET=$(aws cloudformation describe-stacks --region eu-west-2 \
            --stack-name opda-site \
            --query "Stacks[0].Outputs[?OutputKey=='SiteBucketName'].OutputValue" --output text)
          aws s3 sync dist/ "s3://$SITE_BUCKET" --delete

      - name: Invalidate CloudFront
        run: |
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks --region eu-west-2 \
            --stack-name opda-site \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" --output text)
          aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION_ID" --paths '/*'
