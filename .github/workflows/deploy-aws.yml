name: Deploy site to AWS

# App CI/CD per ADR-0040 §2: the AWS successor to deploy.yml (Cloudflare
# Pages). Build is identical — pnpm + JDK + `npm run build:data` (ADR-0021/
# 0036/0037: ephemeral build-time Fuseki + GRLC API, only dist/ ships) — and
# only the upload step differs: aws s3 sync + a full CloudFront invalidation
# (at ~20 views/day, simpler than hashed-path bookkeeping and inside the
# 1,000 free invalidation paths/month).
#
# PRODUCTION since the 2026-06-06 NS cutover (deploy.yml/Cloudflare retired).
#
# Auth: GitHub OIDC → opda-site-deploy role; no static AWS keys (ADR-0040 §1).
# The bucket and distribution IDs are read from the opda-site stack outputs at
# run time — no extra repository variables to drift.

on:
  # Only deploy when something in the production bundle changes. `astro build`
  # ships src/ + public/ + the root build config; source/ and _build/ are
  # dev-only (see astro.config.mjs) and docs/, .claude/, logs/ etc. never ship,
  # so changes confined to those must not trigger a rebuild.
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      # ADR-0021: entity pages are generated from the ontology at build time, so
      # the triplestore inputs + build-time API + orchestration must also trigger.
      - 'config/fuseki-config.ttl'
      - 'scripts/**'
      - 'source/03-standards/ontology/**'
      - '.github/workflows/deploy-aws.yml'
  # Manual escape hatch: force a deploy from the Actions tab when a change
  # outside the paths above needs publishing, or to re-run a build.
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      # ADR-0036/0037: build:data runs a local Apache Jena Fuseki 6.1.0 binary
      # (no Docker), which needs a JDK 17+ on the runner. The Fuseki dist itself
      # is self-provisioned (downloaded + sha512-verified) by build-with-data.mjs.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      # Cache the self-provisioned Fuseki dist (.fuseki/ — the 49 MB tarball +
      # extracted tree). archive.apache.org throttles to ~80 KB/s, so the
      # download alone is ~600s — 94% of build:data and the deploy's single
      # biggest cost (profiled in ADR-0053). On a cache hit, ensureFuseki() finds
      # the extracted jar and skips the download + extract entirely. Keyed on the
      # Fuseki version so a bump (build-with-data.mjs FUSEKI_VERSION) re-primes it.
      - name: Cache Apache Jena Fuseki dist
        uses: actions/cache@v4
        with:
          path: .fuseki
          key: fuseki-6.1.0

      # The ADR-0048 gate below invokes the opda-gen CLI — needs Python + the
      # package installed, same as the ontology-byte-identity / baspi5 workflows.
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - run: pnpm install --frozen-lockfile

      # Build-time GRLC API's own deps (express, js-yaml).
      - run: npm --prefix src/api install --no-audit --no-fund

      # ADR-0021: launch local Fuseki + load the ontology TTLs + start the GRLC
      # API on localhost, run `astro build` (which queries the API to generate
      # entity pages), then tear it all down. The triplestore + API are
      # build-exclusive + ephemeral — only dist/ (static HTML) is deployed;
      # production never runs, reaches, or exposes them.
      - run: npm run build:data

      # ADR-0048 gate needs the opda-gen CLI on PATH (mirrors the sibling
      # ontology workflows' `pip install -e .[dev]`).
      - name: Install opda-gen
        working-directory: tools/opda-gen
        run: pip install -e .[dev]

      # ADR-0048 — relationship-layer object-property coverage gate. Fail the
      # deploy if any owl:ObjectProperty is rangeless-AND-shapeless, a
      # subject-bearer predicate carries a not-universally-true rdfs:domain, the
      # residue register is malformed, or a GATED §R2 edge is not retrievable by
      # its worked competency query. Static rdflib check over the committed
      # corpus + exemplars (no Fuseki/JDK dependency).
      - name: Object-property coverage gate (ADR-0048)
        working-directory: tools/opda-gen
        run: opda-gen ci-object-property-coverage --strict --ontology-dir ../../source/03-standards/ontology

      # ADR-0044 Phase 7 — ontology-model doc-drift gate. build:data regenerates
      # src/data/ontology-model.json from the live triplestore; fail the deploy if
      # it drifted from the committed copy (corpus changed without the model being
      # regenerated + committed). Keeps the committed model — read by the /pdtf
      # pages, typed indexes, .ttl alternates and the ADR-0043 graph — authoritative.
      - name: Ontology model doc-drift gate (ADR-0044)
        run: git diff --exit-code -- src/data/ontology-model.json

      # ADR-0044 Phase 8 — link-validation sweep over the built site: no dangling
      # internal links or orphan pages on the /ontology + /pdtf surface.
      - name: Ontology link-validation sweep (ADR-0044)
        run: node scripts/check-links.mjs

      - name: Assume deploy role (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.OPDA_SITE_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Sync dist/ to the site bucket
        run: |
          SITE_BUCKET=$(aws cloudformation describe-stacks --region eu-west-2 \
            --stack-name opda-site \
            --query "Stacks[0].Outputs[?OutputKey=='SiteBucketName'].OutputValue" --output text)
          aws s3 sync dist/ "s3://$SITE_BUCKET" --delete

      - name: Invalidate CloudFront
        run: |
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks --region eu-west-2 \
            --stack-name opda-site \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" --output text)
          aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION_ID" --paths '/*'
