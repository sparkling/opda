name: Ontology byte-identity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  byte-identity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install opda-gen
        working-directory: tools/opda-gen
        run: pip install -e .[dev]

      - name: Version check
        working-directory: tools/opda-gen
        run: opda-gen --version

      - name: Test suite
        working-directory: tools/opda-gen
        run: pytest -q

      # ----- Activated by ADR-0009 (foundation TTL emission) ------------
      # The four foundation TTLs are committed under
      # source/03-standards/ontology/ — these steps regenerate, diff
      # for byte-identity, and run the ODR-0004 §3a five-part CI test
      # against the real corpus.

      - name: Regenerate corpus
        working-directory: tools/opda-gen
        run: opda-gen emit --output /tmp/ontology

      - name: Byte-identity diff
        run: diff -rq /tmp/ontology source/03-standards/ontology --exclude=exemplars --exclude=derived

      - name: Three-graph CI test
        working-directory: tools/opda-gen
        run: opda-gen ci-three-graph --ontology-dir ../../source/03-standards/ontology

      # ----- Activated by ADR-0010 (SKOS vocabulary emission) -----------
      # `opda-vocabularies.ttl` is committed alongside the foundation TTLs.
      # The `opda-gen emit` umbrella above already regenerates it, and the
      # byte-identity `diff -rq` step already covers the full corpus via
      # the directory-level walk. The explicit subcommand below validates
      # the per-file emission contract on its own (matches ADR-0010's
      # §Confirmation #1 manual test invocation).

      - name: Regenerate vocabularies only (per-file gate)
        working-directory: tools/opda-gen
        run: opda-gen emit-vocabularies --output /tmp/vocabularies-only

      - name: Vocabularies byte-identity
        run: diff -q /tmp/vocabularies-only/opda-vocabularies.ttl source/03-standards/ontology/opda-vocabularies.ttl

      # ----- Activated by ADR-0011 (module TBox emission) ---------------
      # The six per-module TTLs (opda-property / agent / transaction /
      # claim / governance / descriptive) are committed alongside the
      # foundation + vocabularies. The `opda-gen emit` umbrella above
      # already regenerates them, and the byte-identity `diff -rq` step
      # already covers them via the directory-level walk. The explicit
      # subcommand below validates the per-file emission contract on its
      # own for each module (matches ADR-0011 §Confirmation #1).

      - name: Regenerate each module only (per-file gate)
        working-directory: tools/opda-gen
        run: |
          for mod in property agent transaction claim governance descriptive; do
            opda-gen emit-module "$mod" --output "/tmp/module-$mod"
          done

      - name: Modules byte-identity
        run: |
          for mod in property agent transaction claim governance descriptive; do
            diff -q "/tmp/module-$mod/opda-$mod.ttl" "source/03-standards/ontology/opda-$mod.ttl"
          done

      # ----- Activated by ADR-0012 (SHACL + DPV annotation emission) ----
      # Twelve new TTLs (six per-module shapes + six per-module
      # annotations) are committed alongside the foundation + module
      # classes. The `opda-gen emit` umbrella above already regenerates
      # them, and the directory-level `diff -rq` step already covers them.
      # The explicit subcommands below validate the per-file emission
      # contract on its own for each module (matches ADR-0012
      # §Confirmation #1).

      - name: Regenerate each module's shapes only (per-file gate)
        working-directory: tools/opda-gen
        run: |
          for mod in property agent transaction claim governance descriptive; do
            opda-gen emit-shapes --module "$mod" --output "/tmp/shapes-$mod"
          done

      - name: Module shapes byte-identity
        run: |
          for mod in property agent transaction claim governance descriptive; do
            diff -q "/tmp/shapes-$mod/opda-$mod-shapes.ttl" "source/03-standards/ontology/opda-$mod-shapes.ttl"
          done

      - name: Regenerate each module's annotations only (per-file gate)
        working-directory: tools/opda-gen
        run: |
          for mod in property agent transaction claim governance descriptive; do
            opda-gen emit-annotations --module "$mod" --output "/tmp/annotations-$mod"
          done

      - name: Module annotations byte-identity
        run: |
          for mod in property agent transaction claim governance descriptive; do
            diff -q "/tmp/annotations-$mod/opda-$mod-annotations.ttl" "source/03-standards/ontology/opda-$mod-annotations.ttl"
          done

      # ----- Activated by ADR-0014 (BASPI5 round-trip MVP harness) ------
      # validate-exemplar runs pyshacl against a diagnostic exemplar and
      # compares to the paired expected-report.ttl. Stays commented until
      # the exemplar harness lands (ADR-0014). ADR-0012 shapes are now
      # present; ADR-0014 will activate this step.
      #
      # - name: Validate sample exemplar
      #   working-directory: tools/opda-gen
      #   run: opda-gen validate-exemplar ../../source/03-standards/ontology/exemplars/registered-freehold-house.ttl
