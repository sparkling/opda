name: Ontology byte-identity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  byte-identity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install opda-gen
        working-directory: tools/opda-gen
        run: pip install -e .[dev]

      - name: Version check
        working-directory: tools/opda-gen
        run: opda-gen --version

      - name: Test suite
        working-directory: tools/opda-gen
        run: pytest -q

