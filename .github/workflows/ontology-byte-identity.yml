name: Ontology byte-identity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  byte-identity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install opda-gen
        working-directory: tools/opda-gen
        run: pip install -e .[dev]

      - name: Version check
        working-directory: tools/opda-gen
        run: opda-gen --version

      - name: Test suite
        working-directory: tools/opda-gen
        run: pytest -q

      # ----- Activated by ADR-0009 (foundation TTL emission) ------------
      # The four foundation TTLs are committed under
      # source/03-standards/ontology/ — these steps regenerate, diff
      # for byte-identity, and run the ODR-0004 §3a five-part CI test
      # against the real corpus.

      - name: Regenerate corpus
        working-directory: tools/opda-gen
        run: opda-gen emit --output /tmp/ontology

      - name: Byte-identity diff
        run: diff -rq /tmp/ontology source/03-standards/ontology --exclude=exemplars --exclude=derived

      - name: Three-graph CI test
        working-directory: tools/opda-gen
        run: opda-gen ci-three-graph --ontology-dir ../../source/03-standards/ontology

      # ----- Activated by ADR-0010 (SKOS vocabulary emission) -----------
      # `opda-vocabularies.ttl` is committed alongside the foundation TTLs.
      # The `opda-gen emit` umbrella above already regenerates it, and the
      # byte-identity `diff -rq` step already covers the full corpus via
      # the directory-level walk. The explicit subcommand below validates
      # the per-file emission contract on its own (matches ADR-0010's
      # §Confirmation #1 manual test invocation).

      - name: Regenerate vocabularies only (per-file gate)
        working-directory: tools/opda-gen
        run: opda-gen emit-vocabularies --output /tmp/vocabularies-only

      - name: Vocabularies byte-identity
        run: diff -q /tmp/vocabularies-only/opda-vocabularies.ttl source/03-standards/ontology/opda-vocabularies.ttl

      # ----- Activated by ADR-0014 (BASPI5 round-trip MVP harness) ------
      # validate-exemplar runs pyshacl against a diagnostic exemplar and
      # compares to the paired expected-report.ttl. Stays commented until
      # the shapes graph has content (ADR-0012) and the exemplar harness
      # lands (ADR-0014).
      #
      # - name: Validate sample exemplar
      #   working-directory: tools/opda-gen
      #   run: opda-gen validate-exemplar ../../source/03-standards/ontology/exemplars/registered-freehold-house.ttl
