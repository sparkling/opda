name: Deploy to Cloudflare Pages

on:
  # Only deploy when something in the production bundle changes. `astro build`
  # ships src/ + public/ + the root build config; source/ and _build/ are
  # dev-only (see astro.config.mjs) and docs/, .claude/, logs/ etc. never ship,
  # so changes confined to those must not trigger a rebuild.
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - '.github/workflows/deploy.yml'
  # Manual escape hatch: force a deploy from the Actions tab when a change
  # outside the paths above needs publishing, or to re-run a build.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec astro build

      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=opda-kb --branch=main
