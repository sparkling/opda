name: Deploy to Cloudflare Pages

on:
  # Only deploy when something in the production bundle changes. `astro build`
  # ships src/ + public/ + the root build config; source/ and _build/ are
  # dev-only (see astro.config.mjs) and docs/, .claude/, logs/ etc. never ship,
  # so changes confined to those must not trigger a rebuild.
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      # ADR-0021: entity pages are generated from the ontology at build time, so
      # the triplestore inputs + build-time API + orchestration must also trigger.
      - 'docker-compose.yml'
      - 'scripts/**'
      - 'source/03-standards/ontology/**'
      - '.github/workflows/deploy.yml'
  # Manual escape hatch: force a deploy from the Actions tab when a change
  # outside the paths above needs publishing, or to re-run a build.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build-time GRLC API's own deps (express, js-yaml).
      - run: npm --prefix src/api install --no-audit --no-fund

      # ADR-0021: bring up Fuseki (Docker) + load the ontology TTLs + start the
      # GRLC API on localhost, run `astro build` (which queries the API to
      # generate entity pages), then tear it all down. The triplestore + API are
      # build-exclusive + ephemeral — only dist/ (static HTML) is deployed;
      # production never runs, reaches, or exposes them.
      - run: npm run build:data

      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=opda-kb --branch=main
